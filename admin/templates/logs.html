{% extends "layout.html" %}

{% block header %}
<div class="d-flex justify-content-between align-items-center">
    <div>
        <h2 class="page-title">Логи приложения</h2>
        <div class="text-muted mt-1">Последние {{ total }} строк из data/logs/app.log</div>
    </div>
    <div class="d-flex gap-2">
        <a href="{{ request.url }}" class="btn btn-outline-secondary">
            <i class="fa-solid fa-rotate-right me-1"></i>Обновить
        </a>
        <a href="/api/logs/download" class="btn btn-primary">
            <i class="fa-solid fa-download me-1"></i>Скачать лог
        </a>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="container-xl">
    <div class="card">
        <div class="card-body p-0">
            {% if lines %}
            <pre class="m-0 p-3" style="font-size: 0.8rem; max-height: 80vh; overflow-y: auto; background: #1e1e1e; color: #d4d4d4; border-radius: 0 0 4px 4px;">{% for line in lines %}<span class="{% if ' ERROR ' in line or ' CRITICAL ' in line %}text-danger{% elif ' WARNING ' in line %}text-warning{% else %}text-muted{% endif %}">{{ line | e }}</span>
{% endfor %}</pre>
            {% else %}
            <div class="p-4 text-center text-muted">
                <i class="fa-solid fa-file-circle-xmark fa-2x mb-2 d-block"></i>
                Логи пока не записаны
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
